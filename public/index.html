<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leif</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body { background: #0e1713; overflow: hidden; }
      ::-webkit-scrollbar { width: 9px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1f2f26; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #2a4034; }
      .leif-md h1,.leif-md h2,.leif-md h3 { color:#e6f1ea; margin:.8em 0 .4em; line-height:1.3; }
      .leif-md h1{font-size:1.5em;} .leif-md h2{font-size:1.3em;} .leif-md h3{font-size:1.12em;}
      .leif-md p { margin:.55em 0; }
      .leif-md ul,.leif-md ol { margin:.5em 0 .5em 1.4em; }
      .leif-md li { margin:.25em 0; }
      .leif-md a { color:#74d3a3; }
      .leif-md code { background:#16241c; color:#9fe0bd; padding:.12em .4em; border-radius:4px; font-size:.9em; }
      .leif-md pre { background:#0b110e; border:1px solid #1d2c24; border-radius:8px; padding:12px; overflow:auto; margin:.6em 0; }
      .leif-md pre code { background:none; padding:0; }
      .leif-md blockquote { border-left:3px solid #2f8159; padding-left:12px; color:#9bb0a4; margin:.6em 0; }
      .leif-md strong { color:#e6f1ea; }
      .leif-md hr { border:none; border-top:1px solid #1d2c24; margin:1em 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
